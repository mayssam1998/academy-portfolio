<section id="projects">
  <p class="section__text__p1">Browse My Recent</p>
  <h1 class="title">Projects</h1>
  <div class="experience-details-container">
    <div class="about-containers">
      <div class="details-container color-container" *ngFor="let project of projects">
        <div class="article-container">
          <img
            [src]="project.image"
            [alt]="project.title"
            class="project-img"
          />
        </div>
        <h2 class="experience-sub-title project-title">{{ project.title }}</h2>
        <div class="btn-container">
          <button
            class="btn btn-color-2 project-btn"
            (click)="openGithub(project.githubUrl)"
          >
            Github
          </button>
          <button
            class="btn btn-color-2 project-btn"
            (click)="openLiveDemo(project.demoUrl)"
          >
            Live Demo
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
