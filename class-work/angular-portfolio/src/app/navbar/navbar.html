<nav class="navbar" [class.navbar--scrolled]="isScrolled">
  <div class="navbar__container">

    
    <a class="navbar__logo" (click)="navigateTo('home')" role="button" tabindex="0">
      <span class="navbar__logo-text">Nawar<span class="navbar__logo-accent">.</span></span>
    </a>

    
    <ul class="navbar__links">
      @for (link of navLinks; track link.id) {
        <li class="navbar__item">
          <a
            class="navbar__link"
            [class.navbar__link--active]="activeSection === link.id"
            (click)="navigateTo(link.id)"
            role="button"
            tabindex="0">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    
    <a class="navbar__cta btn" (click)="navigateTo('contact')" role="button" tabindex="0">
      Hire Me
    </a>

    
    <button
      class="navbar__hamburger"
      [class.navbar__hamburger--open]="isMobileOpen"
      (click)="toggleMobileMenu()"
      aria-label="Toggle navigation menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  
  <div class="navbar__mobile" [class.navbar__mobile--open]="isMobileOpen">
    <ul class="navbar__mobile-links">
      @for (link of navLinks; track link.id) {
        <li>
          <a
            class="navbar__mobile-link"
            [class.navbar__mobile-link--active]="activeSection === link.id"
            (click)="navigateTo(link.id)"
            role="button"
            tabindex="0">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>
  </div>
</nav>
