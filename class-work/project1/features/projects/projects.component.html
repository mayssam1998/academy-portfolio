<section id="projects">
  <p class="section__text__p1">Browse My Recent</p>
  <h1 class="title">Projects</h1>

  <div class="projects-container">
    @for (project of projects; track project.title) {
      <app-project-card
        [title]="project.title"
        [image]="project.image"
        [github]="project.github"
        [demo]="project.demo">
      </app-project-card>
    }
  </div>
</section>
