<section id="profile">
  <div class="section__profile">
    <div class="section__img">
      <img src="random.jpeg" alt="Development picture" />
    </div>
  </div>
  <div class="section__profile_text">
    <div>
      <h1 class="title">{{ userName }}</h1>
      <p class="section__text__p2">{{ userRole }}</p>
    </div>
    <div class="btn-container">
      <button class="btn btn-color-2" (click)="downloadCV()">
        Download CV
      </button>
      <button class="btn btn-color-1" (click)="goToContact()">
        Contact Info
      </button>
    </div>
    <div id="socials-container">
      <img
        src="linkedin.png"
        alt="LinkedIn"
        class="icon"
        (click)="openLinkedIn()"
      />
      <img
        src="github.png"
        alt="GitHub"
        class="icon"
        (click)="openGitHub()"
      />
    </div>
  </div>
</section>
